<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/fonts.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/colors.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/typography.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/spacing.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/effects.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/base.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/styles.css">
<script src="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/_ds_bundle.js"></script>
</helmet>
<div style="width:100%;font-family:var(--font-sans);">

  <!-- EXAM ROW -->
  <sc-if value="{{ isExam }}">
  <div style="display:flex;align-items:center;gap:16px;padding:16px;border-radius:8px;background:rgba(241,194,27,0.12);border:1px dashed #E8CF8E;cursor:pointer;transition:background .18s;" style-hover="background:rgba(241,194,27,0.2);">
    <div style="width:40px;height:40px;clip-path:polygon(50% 0,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:rgba(241,194,27,0.3);color:#8A6E00;display:flex;align-items:center;justify-content:center;flex:none;">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1"></rect><path d="m9 14 2 2 4-4"></path></svg>
    </div>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:600;font-size:15px;color:var(--neutral-charcoal);">{{ title }}</div>
      <div style="font-size:12.5px;color:#8A6E00;font-weight:400;margin-top:4px;">{{ examKind }} · {{ duration }}</div>
    </div>
    <span style="display:inline-flex;align-items:center;gap:8px;background:var(--white);color:#8A6E00;font-weight:600;font-size:13.5px;border:1px solid #E8CF8E;border-radius:8px;padding:8px 16px;flex:none;">
      גש למבחן
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
    </span>
  </div>
  </sc-if>

  <!-- LOCKED LESSON -->
  <sc-if value="{{ locked }}">
  <div style="display:flex;align-items:center;gap:16px;padding:16px;border-radius:8px;background:var(--neutral-whisper);opacity:.7;cursor:not-allowed;">
    <div style="width:40px;height:40px;border-radius:8px;background:var(--neutral-silver);color:var(--neutral-nickel);display:flex;align-items:center;justify-content:center;flex:none;">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:400;font-size:15px;color:var(--neutral-lead);">{{ title }}</div>
      <div style="display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--neutral-nickel);margin-top:4px;">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        השלם את השיעור הקודם כדי להמשיך
      </div>
    </div>
    <span style="font-size:13px;color:var(--neutral-nickel);font-weight:400;flex:none;">{{ duration }}</span>
  </div>
  </sc-if>

  <!-- ACTIVE LESSON (not_started / in_progress / completed) -->
  <sc-if value="{{ isLesson }}" hint-placeholder-val="{{ true }}">
  <div style="display:flex;align-items:center;gap:16px;padding:16px;border-radius:8px;background:var(--white);cursor:pointer;transition:background .18s;" style-hover="background:var(--neutral-whisper);">

    <!-- indicator -->
    <sc-if value="{{ completed }}">
    <div style="width:40px;height:40px;border-radius:50%;background:var(--hue-mint);color:var(--success);display:flex;align-items:center;justify-content:center;flex:none;">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    </sc-if>
    <sc-if value="{{ inProgress }}" hint-placeholder-val="{{ true }}">
    <div style="width:40px;height:40px;border-radius:50%;background:var(--hue-sky);color:var(--accent);display:flex;align-items:center;justify-content:center;flex:none;">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
    </div>
    </sc-if>
    <sc-if value="{{ notStarted }}">
    <div style="width:40px;height:40px;border-radius:50%;background:var(--neutral-whisper);border:1.5px solid var(--neutral-silver);color:var(--neutral-nickel);display:flex;align-items:center;justify-content:center;flex:none;">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
    </div>
    </sc-if>

    <!-- middle -->
    <div style="flex:1;min-width:0;">
      <div style="font-weight:400;font-size:15px;color:var(--neutral-charcoal);">{{ title }}</div>
      <sc-if value="{{ inProgress }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <div style="flex:1;max-width:200px;height:6px;border-radius:var(--radius-full);background:var(--hue-sky);overflow:hidden;"><div style="height:100%;border-radius:var(--radius-full);background:var(--gradient-accent);width:{{ barWidth }};transition:width .5s cubic-bezier(.22,.61,.36,1);"></div></div>
        <span style="font-weight:600;font-size:12px;color:var(--accent);">{{ pctText }}</span>
      </div>
      </sc-if>
      <sc-if value="{{ notStarted }}">
      <div style="display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--neutral-lead);margin-top:4px;">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
        {{ duration }}
      </div>
      </sc-if>
      <sc-if value="{{ completed }}">
      <div style="display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--success);font-weight:600;margin-top:4px;">הושלם · {{ duration }}</div>
      </sc-if>
    </div>

    <!-- action -->
    <sc-if value="{{ notStarted }}">
    <span style="display:inline-flex;align-items:center;gap:7px;background:var(--hue-sky);color:var(--accent);font-weight:600;font-size:13.5px;border-radius:8px;padding:8px 16px;flex:none;transition:background .18s;" style-hover="background:#DCEBFB;">התחל</span>
    </sc-if>
    <sc-if value="{{ inProgress }}" hint-placeholder-val="{{ true }}">
    <span style="display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-weight:600;font-size:13.5px;border-radius:8px;padding:8px 16px;flex:none;box-shadow:0 6px 14px rgba(0,117,219,.24);transition:background .18s;" style-hover="background:#0059A8;">המשך<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg></span>
    </sc-if>
    <sc-if value="{{ completed }}">
    <span style="display:inline-flex;align-items:center;gap:5px;background:var(--hue-mint);color:var(--success);font-weight:600;font-size:13px;border-radius:var(--radius-full);padding:6px 12px;flex:none;">{{ xpText }}</span>
    </sc-if>
  </div>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:72},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;מהי כתובת IP&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;duration&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;14 דק׳&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;not_started&quot;,&quot;in_progress&quot;,&quot;completed&quot;,&quot;locked&quot;],&quot;default&quot;:&quot;in_progress&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;percent&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:40,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;xp&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:10,&quot;tsType&quot;:&quot;number&quot;},&quot;isExam&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;examKind&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;מבחן נושא&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const status = p.status || 'not_started';
    const pct = p.percent ?? 0;
    const isExam = !!p.isExam;
    return {
      title: p.title ?? '',
      duration: p.duration ?? '',
      xpText: '+' + (p.xp ?? 10) + ' XP',
      examKind: p.examKind ?? 'מבחן נושא',
      barWidth: pct + '%',
      pctText: pct + '%',
      isExam,
      locked: !isExam && status === 'locked',
      completed: !isExam && status === 'completed',
      inProgress: !isExam && status === 'in_progress',
      notStarted: !isExam && status === 'not_started',
      isLesson: !isExam && status !== 'locked',
    };
  }
}

</script>
</body>
</html>
