<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/fonts.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/colors.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/typography.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/spacing.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/effects.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/base.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/styles.css">
<script src="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/_ds_bundle.js"></script>
<style>
  html,body{margin:0;padding:0;height:100%;}
  @keyframes nfRise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</helmet>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#F2F5F8"/><polygon points="50,20 74,34 74,66 50,80 26,66 26,34" fill="none" stroke="#0075DB" stroke-width="6" stroke-linejoin="round"/></svg></template>

<div dir="rtl" data-screen-label="404" style="min-height:100vh;display:flex;flex-direction:column;background:var(--surface-app);font-family:'Ploni ML v2 AAA',sans-serif;color:var(--text-primary);position:relative;overflow:hidden;">

  <!-- decorative brand hexagons (very faint, corners) -->
  <svg viewBox="0 0 100 100" aria-hidden="true" style="position:absolute;width:420px;height:420px;top:-140px;left:-120px;opacity:.55;pointer-events:none;"><polygon points="50,2 92,26 92,74 50,98 8,74 8,26" fill="none" stroke="var(--neutral-silver)" stroke-width="1.6" stroke-linejoin="round"></polygon></svg>
  <svg viewBox="0 0 100 100" aria-hidden="true" style="position:absolute;width:560px;height:560px;bottom:-220px;right:-180px;opacity:.5;pointer-events:none;"><polygon points="50,2 92,26 92,74 50,98 8,74 8,26" fill="none" stroke="var(--neutral-silver)" stroke-width="1.2" stroke-linejoin="round"></polygon></svg>
  <svg viewBox="0 0 100 100" aria-hidden="true" style="position:absolute;width:160px;height:160px;top:26%;right:9%;opacity:.6;pointer-events:none;"><polygon points="50,2 92,26 92,74 50,98 8,74 8,26" fill="var(--hue-sky)" opacity=".35" stroke="none"></polygon></svg>
  <svg viewBox="0 0 100 100" aria-hidden="true" style="position:absolute;width:104px;height:104px;bottom:18%;left:12%;opacity:.6;pointer-events:none;"><polygon points="50,2 92,26 92,74 50,98 8,74 8,26" fill="none" stroke="var(--neutral-palladium)" stroke-width="2" stroke-linejoin="round" opacity=".45"></polygon></svg>

  <!-- header: logo only, bottom line only -->
  <sc-if value="{{ showLogo }}" hint-placeholder-val="{{ true }}">
  <header style="position:relative;display:flex;align-items:center;height:64px;padding:0 32px;border-bottom:1px solid var(--neutral-silver);background:var(--white);">
    <img src="assets/logo-gradient.png" alt="iPracticom" style="height:26px;"/>
  </header>
  </sc-if>

  <!-- centered composition -->
  <main style="position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:64px 24px;animation:nfRise .3s ease both;">

    <!-- status pill (text only, no dot) -->
    <span style="display:inline-flex;align-items:center;height:28px;padding:0 16px;border-radius:999px;background:var(--hue-sky);color:var(--hue-cobalt);font-weight:600;font-size:var(--text-tiny-size);line-height:1;">{{ pillLabel }}</span>

    <!-- the code: digit · gradient hexagon zero · digit -->
    <div dir="ltr" aria-label="{{ codeAria }}" style="display:flex;align-items:center;gap:clamp(12px,2.5vw,24px);margin-top:32px;">
      <span style="font-weight:600;font-size:clamp(112px,19vw,192px);line-height:1;letter-spacing:-0.02em;color:var(--neutral-charcoal);">{{ d1 }}</span>
      <svg viewBox="0 0 100 100" aria-hidden="true" style="height:clamp(88px,15vw,152px);width:auto;flex:none;">
        <defs>
          <linearGradient id="nf-hex-grad" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0" stop-color="#33B1FF"></stop>
            <stop offset="1" stop-color="#282FEF"></stop>
          </linearGradient>
        </defs>
        <polygon points="50,4 90,27 90,73 50,96 10,73 10,27" fill="none" stroke="url(#nf-hex-grad)" stroke-width="13" stroke-linejoin="round"></polygon>
      </svg>
      <span style="font-weight:600;font-size:clamp(112px,19vw,192px);line-height:1;letter-spacing:-0.02em;color:var(--neutral-charcoal);">{{ d3 }}</span>
    </div>

    <h1 style="margin:40px 0 0;font-weight:600;font-size:clamp(28px,4vw,36px);line-height:1.25;letter-spacing:-0.3px;color:var(--neutral-charcoal);">{{ heading }}</h1>
    <p style="margin:16px 0 0;max-width:440px;font-size:var(--text-body-size);line-height:var(--text-body-line);color:var(--text-secondary);text-wrap:pretty;">{{ body }}</p>

    <!-- actions: cancel-ish right, confirm left (RTL rule) -->
    <div style="display:flex;align-items:center;gap:16px;margin-top:40px;flex-wrap:wrap;justify-content:center;">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="outlined" onClick="{{ goBack }}" hint-size="auto,40px">
        <span style="display:inline-flex;align-items:center;gap:8px;">
          <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="ArrowEast" size="18" hint-size="18px,18px"></x-import>
          חזרה לעמוד הקודם
        </span>
      </x-import>
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="primary" hint-size="auto,40px">
        <a href="{{ homeHref }}" style="text-decoration:none;color:inherit;display:inline-flex;align-items:center;gap:8px;">חזרה לדף הבית</a>
      </x-import>
    </div>

    <!-- quiet support path -->
    <p style="margin:48px 0 0;font-size:var(--text-tiny-size);color:var(--text-muted);">
      קוד שגיאה: <span dir="ltr">{{ code }}</span>
      <span style="padding:0 8px;">·</span>
      אם הבעיה חוזרת, <a href="mailto:support@ipracticom.co.il" style="color:var(--text-link);text-decoration:none;" style-hover="text-decoration:underline;">כתבו לתמיכה</a>
    </p>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;errorCode&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;404&quot;, &quot;403&quot;, &quot;500&quot;], &quot;default&quot;: &quot;404&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;תוכן&quot; },
  &quot;showLogo&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;תצוגה&quot; },
  &quot;homeHref&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Learner Dashboard.dc.html&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;ניווט&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const code = this.props.errorCode ?? "404";
    const copy = {
      "404": {
        pill: "שגיאה 404",
        heading: "העמוד שחיפשתם לא נמצא",
        body: "יכול להיות שהקישור השתנה, שהעמוד הועבר, או שהוא כבר לא קיים במערכת."
      },
      "403": {
        pill: "שגיאה 403",
        heading: "אין לכם הרשאה לעמוד הזה",
        body: "העמוד קיים, אבל נדרשת הרשאה מתאימה כדי לצפות בו. פנו למנהל המערכת אם אתם צריכים גישה."
      },
      "500": {
        pill: "שגיאה 500",
        heading: "משהו השתבש אצלנו",
        body: "אירעה שגיאה זמנית במערכת. רעננו את העמוד בעוד רגע — אנחנו כבר על זה."
      }
    };
    const c = copy[code] || copy["404"];
    return {
      code: code,
      codeAria: "שגיאה " + code,
      d1: code.charAt(0),
      d3: code.charAt(2),
      pillLabel: c.pill,
      heading: c.heading,
      body: c.body,
      showLogo: this.props.showLogo ?? true,
      homeHref: this.props.homeHref ?? "Learner Dashboard.dc.html",
      goBack: () => history.back()
    };
  }
}
</script>
</body>
</html>
