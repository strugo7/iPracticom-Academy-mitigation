<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/fonts.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/colors.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/typography.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/spacing.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/effects.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/base.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/styles.css">
<script src="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/_ds_bundle.js"></script>
</helmet>
<div style="display:flex;flex-direction:column;min-height:100%;font-family:var(--font-sans);color:var(--neutral-charcoal);">

  <!-- head -->
  <div style="flex:none;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:16px 20px 12px;border-bottom:1px solid var(--neutral-silver);">
    <h2 style="font-weight:600;font-size:16px;margin:0;color:var(--neutral-charcoal);">פרטי הנכס</h2>
    <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.IconButton" variant="outline" size="sm" onClick="{{ asset.onClose }}" aria-label="סגור" hint-size="32px,32px"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></x-import>
  </div>

  <div style="flex:1;padding:16px 20px 20px;display:flex;flex-direction:column;gap:16px;">

    <!-- preview -->
    <div style="position:relative;border-radius:var(--radius-xl);overflow:hidden;height:200px;background:{{ asset.thumbBg }};display:flex;align-items:center;justify-content:center;color:{{ asset.thumbFg }};border:1px solid var(--neutral-silver);">
      {{ bigIcon }}
      <span style="position:absolute;top:8px;inset-inline-end:8px;font-size:11.5px;font-weight:600;color:#fff;background:{{ asset.badgeBg }};border-radius:var(--radius-md);padding:4px 10px;">{{ asset.typeLabel }}</span>
      <sc-if value="{{ asset.isVideo }}"><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.94);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(20,40,70,.35);"><svg viewBox="0 0 24 24" width="24" height="24" fill="var(--neutral-charcoal)" stroke="none" style="margin-inline-start:3px;"><polygon points="6 4 20 12 6 20"></polygon></svg></span></sc-if>
    </div>

    <!-- title -->
    <div>
      <div style="font-weight:600;font-size:18px;line-height:1.3;color:var(--neutral-charcoal);">{{ asset.title }}</div>
    </div>

    <!-- quick actions -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="primary" leadingIcon="{{ copyIcon }}" hint-size="auto,44px">העתק URL</x-import>
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="outlined" leadingIcon="{{ downloadIcon }}" hint-size="auto,44px">הורד</x-import>
    </div>

    <!-- meta -->
    <div style="background:var(--neutral-whisper);border:1px solid var(--neutral-silver);border-radius:var(--radius-lg);padding:0 16px;">
      <sc-for list="{{ metaRows }}" as="m" hint-placeholder-count="5">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid {{ m.line }};">
        <span style="font-size:12.5px;color:var(--neutral-nickel);font-weight:400;">{{ m.label }}</span>
        <span style="font-size:13px;color:var(--neutral-charcoal);font-weight:600;text-align:start;">{{ m.value }}</span>
      </div>
      </sc-for>
    </div>

    <!-- topic -->
    <div>
      <label style="display:block;font-weight:600;font-size:12.5px;color:var(--neutral-lead);margin-bottom:8px;">נושא</label>
      <div style="display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 16px;border-radius:var(--radius-md);border:1px solid var(--neutral-silver);background:var(--white);font-size:13.5px;font-weight:400;cursor:pointer;"><span style="display:flex;align-items:center;gap:8px;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-6l-2-3H5a2 2 0 0 0-2 2z"></path></svg>{{ asset.topic }}</span><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="var(--neutral-nickel)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
    </div>

    <!-- tags -->
    <div>
      <label style="display:block;font-weight:600;font-size:12.5px;color:var(--neutral-lead);margin-bottom:8px;">תגיות</label>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px;border-radius:var(--radius-md);border:1px solid var(--neutral-silver);background:var(--white);">
        <sc-for list="{{ tagChips }}" as="g" hint-placeholder-count="3">
        <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Tag" type="blue" hint-size="auto,24px">{{ g.label }}</x-import>
        </sc-for>
        <span style="font-size:12px;font-weight:400;color:var(--neutral-nickel);padding:4px;">+ הוסף</span>
      </div>
    </div>

    <!-- where used -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <label style="font-weight:600;font-size:12.5px;color:var(--neutral-lead);">היכן בשימוש</label>
        <span style="font-size:11.5px;font-weight:600;color:{{ useFg }};background:{{ useBg }};border-radius:var(--radius-full);padding:4px 10px;">{{ useLabel }}</span>
      </div>
      <sc-if value="{{ hasUses }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <sc-for list="{{ useRows }}" as="u" hint-placeholder-count="3">
        <div style="display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--neutral-silver);border-radius:var(--radius-md);padding:8px 12px;cursor:pointer;transition:all .15s;" style-hover="border-color:var(--neutral-palladium);background:var(--neutral-whisper);">
          <span style="flex:none;width:28px;height:28px;border-radius:var(--radius-md);background:{{ u.iconBg }};color:{{ u.iconFg }};display:flex;align-items:center;justify-content:center;">{{ u.icon }}</span>
          <span style="flex:1;font-size:13px;font-weight:400;color:var(--neutral-lead);line-height:1.35;">{{ u.label }}</span>
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="var(--neutral-palladium)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
        </div>
        </sc-for>
      </div>
      </sc-if>
      <sc-if value="{{ noUses }}">
      <div style="display:flex;align-items:center;gap:8px;background:var(--neutral-whisper);border:1px dashed var(--neutral-palladium);border-radius:var(--radius-md);padding:12px 16px;color:var(--neutral-nickel);font-size:13px;font-weight:400;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01"></path></svg>הנכס אינו בשימוש כרגע</div>
      </sc-if>
    </div>
  </div>

  <!-- footer actions -->
  <div style="flex:none;position:sticky;bottom:0;display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--neutral-silver);background:var(--white);">
    <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="outlined" leadingIcon="{{ swapIcon }}" hint-size="1fr,44px" style="flex:1;">החלף</x-import>
    <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="outlined" onClick="{{ asset.onDelete }}" leadingIcon="{{ deleteIcon }}" hint-size="1fr,44px" style="flex:1;color:var(--caution);border-color:var(--caution);">מחק</x-import>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:900},&quot;asset&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;}}">
class Component extends DCLogic {
  rawHtml(s){ return React.createElement('span', { dangerouslySetInnerHTML:{ __html:s }, style:{ display:'flex' } }); }
  renderVals(){
    const a = this.props.asset || {};
    const useIcons = {
      q:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 17 2 2 4-4M3 7l2 2 4-4M13 6h8M13 12h8M13 18h8"></path></svg>',
      e:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>',
      m:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>',
      t:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="m16 8-6 8-4-3"></path></svg>',
      l:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>',
    };
    const useTints = { q:['var(--hue-sky)','var(--accent)'], e:['var(--hue-mint)','var(--success)'], m:['#EFE7DF','var(--hue-bronze)'], t:['rgba(241,194,27,0.2)','#8A6E00'], l:['var(--hue-sky)','var(--accent)'] };

    const metaRows = [
      { label:'שם הקובץ', value:(a.title||'')+'.'+({image:'jpg',gif:'gif',video:'mp4',pdf:'pdf'}[a.type]||'jpg') },
      { label:'סוג', value:a.typeLabel },
      { label:'גודל', value:a.size },
      { label:(a.type==='pdf'?'היקף':(a.type==='video'?'מימדים · אורך':'מימדים')), value:a.dims },
      { label:'תאריך העלאה', value:a.date },
      { label:'מעלה', value:a.by },
    ].map((m,i,arr)=>({ ...m, line: i===arr.length-1 ? 'transparent' : 'var(--neutral-silver)' }));

    const uses = a.uses || [];
    const useRows = uses.map(u => { const tint=useTints[u.icon]||['var(--neutral-whisper)','var(--neutral-lead)'];
      return { label:u.label, icon:this.rawHtml(useIcons[u.icon]||useIcons.m), iconBg:tint[0], iconFg:tint[1] }; });

    return {
      asset: a,
      bigIcon: this.rawHtml(a.bigIcon || ''),
      metaRows,
      tagChips: (a.tags||[]).map(t=>({label:t})),
      hasUses: uses.length>0, noUses: uses.length===0,
      useRows,
      useLabel: uses.length>0 ? (uses.length+' מקומות') : 'לא בשימוש',
      useFg: uses.length>0 ? 'var(--success)' : 'var(--neutral-nickel)', useBg: uses.length>0 ? 'var(--hue-mint)' : 'var(--neutral-whisper)',
      copyIcon: this.rawHtml('<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>'),
      downloadIcon: this.rawHtml('<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>'),
      swapIcon: this.rawHtml('<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6"></path><path d="M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"></path></svg>'),
      deleteIcon: this.rawHtml('<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>'),
    };
  }
}

</script>
</body>
</html>
