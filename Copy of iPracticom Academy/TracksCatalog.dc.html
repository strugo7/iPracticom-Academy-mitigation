<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/fonts.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/colors.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/typography.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/spacing.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/effects.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/base.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/styles.css">
<script src="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/_ds_bundle.js"></script>
</helmet>
<div style="width:100%;font-family:var(--font-sans);">
  <sc-if value="{{ hasTracks }}" hint-placeholder-val="{{ true }}">
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,360px));gap:24px;justify-content:flex-start;">
    <sc-for list="{{ tracks }}" as="track" hint-placeholder-count="1">
    <dc-import name="TrackCard" status="{{ track.status }}" category="{{ track.category }}" title="{{ track.title }}" description="{{ track.description }}" difficulty="{{ track.difficulty }}" hours="{{ track.hours }}" lessons-done="{{ track.lessonsDone }}" lessons-total="{{ track.lessonsTotal }}" percent="{{ track.percent }}" thumb="{{ track.thumb }}" href="{{ track.href }}" hint-size="360px,446px"></dc-import>
    </sc-for>
  </div>
  </sc-if>

  <sc-if value="{{ empty }}">
  <div style="max-width:560px;margin:24px auto;background:var(--surface-card);border-radius:var(--radius-xl);padding:48px 40px;text-align:center;box-shadow:var(--shadow-card);display:flex;flex-direction:column;align-items:center;">
    <img src="assets/illus-file.png" alt="" style="width:160px;height:auto;margin-bottom:24px;"/>
    <h3 style="font-weight:var(--font-weight-demibold);font-size:23px;margin:0 0 8px;color:var(--text-primary);">עדיין לא שויכת למסלול הכשרה</h3>
    <p style="font-size:var(--text-small-size);line-height:1.6;color:var(--text-secondary);margin:0 0 24px;max-width:380px;">המנהל שלך יקצה לך מסלול קליטה בקרוב. בינתיים אפשר לעיין בספריית הידע ולהתחיל להכיר את התחום.</p>
    <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="outlined" hint-size="auto,40px">
      <span style="display:inline-flex;align-items:center;gap:8px;">
        <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="File" size="18" hint-size="18px,18px"></x-import>
        לספריית הידע
      </span>
    </x-import>
  </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:520},&quot;tracks&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;TrackData[]&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const tracks = Array.isArray(this.props.tracks) ? this.props.tracks : [];
    return {
      tracks,
      hasTracks: tracks.length > 0,
      empty: tracks.length === 0,
    };
  }
}

</script>
</body>
</html>
