<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/fonts.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/colors.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/typography.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/spacing.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/effects.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/base.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/styles.css">
<script src="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/_ds_bundle.js"></script>
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--surface-app);-webkit-font-smoothing:antialiased;}
@media (max-width:640px){[data-pad]{padding-left:16px !important;padding-right:16px !important;}}
</style>
</helmet>
<div dir="rtl" data-screen-label="תוכן ההכשרה" style="min-height:100vh;background:var(--surface-app);color:var(--neutral-charcoal);display:flex;flex-direction:row;font-family:var(--font-sans);">

  <dc-import name="SideNav" active="trainings" hint-size="248px,100vh"></dc-import>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column;">

    <dc-import name="TopBar" title="{{ trackTitle }}" subtitle="תוכן ההכשרה" notif="3" hint-size="100%,76px" style="position:sticky;top:0;z-index:20;">
      <a href="My Trainings.dc.html" style="display:inline-flex;align-items:center;gap:8px;color:var(--neutral-charcoal);text-decoration:none;font-weight:600;font-size:14px;transition:color .18s;" style-hover="color:var(--accent);">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        ההכשרות שלי
      </a>
    </dc-import>

    <main data-pad style="flex:1;width:100%;max-width:1080px;margin:0 auto;padding:24px 32px 40px;display:flex;flex-direction:column;gap:24px;">

      <dc-import name="TrackProgressHeader" track-title="{{ trackTitle }}" percent="{{ percent }}" lessons-done="{{ lessonsDone }}" lessons-total="{{ lessonsTotal }}" total-xp="{{ totalXp }}" continue-href="{{ continueHref }}" hint-size="100%,240px"></dc-import>

      <div>
        <h3 style="font-weight:600;font-size:var(--text-h4-size);margin:0 0 16px;display:flex;align-items:center;gap:8px;color:var(--neutral-charcoal);">
          <svg viewBox="0 0 24 24" width="20" height="20" style="color:var(--accent);" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          תוכן ההכשרה
        </h3>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <sc-for list="{{ modules }}" as="mod" hint-placeholder-count="2">
          <dc-import name="ModuleSection" title="{{ mod.title }}" duration="{{ mod.duration }}" module-number="{{ mod.moduleNumber }}" topic-count="{{ mod.topicCount }}" lesson-count="{{ mod.lessonCount }}" lessons-done="{{ mod.lessonsDone }}" lessons-total="{{ mod.lessonsTotal }}" initial-open="{{ mod.initialOpen }}" topics="{{ mod.topics }}" hint-size="100%,120px"></dc-import>
          </sc-for>
        </div>
      </div>

    </main>

    <footer style="border-top:1px solid var(--neutral-silver);background:var(--white);">
      <div data-pad style="max-width:1080px;margin:0 auto;padding:16px 32px;text-align:center;color:var(--neutral-lead);font-size:13px;">© iPracticom Academy — לשימוש פנימי בלבד</div>
    </footer>

  </div>
</div>

</x-dc>

</body>
</html>
