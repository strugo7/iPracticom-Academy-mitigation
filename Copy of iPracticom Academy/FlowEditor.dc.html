<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap');
@font-face{font-family:"Ploni";src:url("fonts/PloniRegular.otf") format("opentype");font-weight:400;font-display:swap;}
@font-face{font-family:"Ploni";src:url("fonts/PloniMedium.otf") format("opentype");font-weight:500;font-display:swap;}
@font-face{font-family:"Ploni";src:url("fonts/PloniDBold.otf") format("opentype");font-weight:600;font-display:swap;}
@font-face{font-family:"Ploni";src:url("fonts/PloniBold.otf") format("opentype");font-weight:700;font-display:swap;}
@font-face{font-family:"Ploni";src:url("fonts/PloniUBold.otf") format("opentype");font-weight:800;font-display:swap;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:"Ploni","Assistant",system-ui,sans-serif;background:#F4FBFF;-webkit-font-smoothing:antialiased;}
</style>
</helmet>
<div dir="rtl" data-screen-label="עורך Playbook" style="height:100vh;display:flex;flex-direction:column;background:#F4FBFF;color:#181D24;overflow:hidden;">

  <!-- TOOLBAR -->
  <header style="flex:none;height:62px;background:#fff;border-bottom:1px solid #E3E9F0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:30;box-shadow:0 1px 3px rgba(20,60,110,.05);">
    <div style="display:flex;align-items:center;gap:14px;min-width:0;">
      <a href="Troubleshooting.dc.html" style="width:36px;height:36px;border-radius:10px;border:1px solid #E3E9F0;background:#fff;color:#3D4753;display:flex;align-items:center;justify-content:center;flex:none;text-decoration:none;transition:all .18s;" style-hover="border-color:#CFD8E3;background:#F8FBFE;">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </a>
      <div style="min-width:0;">
        <div style="display:flex;align-items:center;gap:9px;">
          <h1 style="font-weight:800;font-size:17px;margin:0;white-space:nowrap;">תקלת מצלמת אבטחה</h1>
          <span style="font-size:11px;font-weight:700;color:#B5891A;background:#FCF3DA;padding:2px 9px;border-radius:999px;">טיוטה</span>
        </div>
        <div style="font-size:12px;color:#6B7785;margin-top:1px;">עורך Playbook · מצלמות אבטחה</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button aria-label="ביטול" style="width:36px;height:36px;border-radius:10px;border:1px solid #E3E9F0;background:#fff;color:#6B7785;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;" style-hover="border-color:#CFD8E3;background:#F8FBFE;"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button>
      <button aria-label="חזרה" style="width:36px;height:36px;border-radius:10px;border:1px solid #E3E9F0;background:#fff;color:#6B7785;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;" style-hover="border-color:#CFD8E3;background:#F8FBFE;"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"></path></svg></button>
      <div style="width:1px;height:24px;background:#E3E9F0;margin:0 4px;"></div>
      <button style="display:inline-flex;align-items:center;gap:8px;background:#F4F8FC;color:#3D4753;font-family:inherit;font-weight:700;font-size:13.5px;border:1px solid #E3E9F0;border-radius:11px;padding:9px 16px;cursor:pointer;transition:all .18s;" style-hover="background:#fff;border-color:#CFD8E3;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>תצוגה מקדימה</button>
      <button style="display:inline-flex;align-items:center;gap:8px;background:#0075DB;color:#fff;font-family:inherit;font-weight:700;font-size:13.5px;border:0;border-radius:11px;padding:9px 18px;cursor:pointer;box-shadow:0 8px 20px rgba(0,117,219,.26);transition:background .2s;" style-hover="background:#0059A8;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>שמירה</button>
      <img src="assets/logo-gradient.png" alt="iPracticom" style="height:24px;opacity:.5;margin-inline-start:8px;"/>
    </div>
  </header>

  <!-- CANVAS REGION -->
  <div style="position:relative;flex:1;min-height:0;overflow:hidden;">
    <div style="position:absolute;inset:0;overflow:auto;">
      <div style="position:relative;width:1480px;height:710px;background-color:#F4FBFF;background-image:radial-gradient(#CFDDEA 1.4px, transparent 1.4px);background-size:24px 24px;">

        <svg width="1480" height="710" style="position:absolute;inset:0;z-index:1;pointer-events:none;">
          <defs>
            <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#B7C2CF"></path></marker>
          </defs>
          <sc-for list="{{ edges }}" as="edge" hint-placeholder-count="6">
          <path d="{{ edge.d }}" fill="none" stroke="#B7C2CF" stroke-width="2.4" marker-end="url(#ah)"></path>
          </sc-for>
        </svg>

        <sc-for list="{{ nodes }}" as="n" hint-placeholder-count="8">
        <dc-import name="FlowNode" type="{{ n.type }}" title="{{ n.title }}" preview="{{ n.preview }}" state="{{ n.state }}" has-media="{{ n.hasMedia }}" deep-link="{{ n.deepLink }}" height="{{ n.height }}" input-dy="{{ n.inputDy }}" outputs="{{ n.outputs }}" style="position:absolute;left:{{ n.x }}px;top:{{ n.y }}px;width:232px;z-index:2;" hint-size="232px,120px"></dc-import>
        </sc-for>

      </div>
    </div>

    <!-- NODE PALETTE (right) -->
    <div style="position:absolute;top:20px;right:20px;width:186px;background:#fff;border:1px solid #E3E9F0;border-radius:16px;box-shadow:0 8px 24px rgba(20,60,110,.10);padding:14px;z-index:20;">
      <div style="font-weight:700;font-size:13px;color:#181D24;margin-bottom:10px;display:flex;align-items:center;gap:7px;"><svg viewBox="0 0 24 24" width="15" height="15" style="color:#0075DB;" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect></svg>צמתים</div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <sc-for list="{{ palette }}" as="pal" hint-placeholder-count="6">
        <div style="display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:9px;border:1px solid #EEF2F7;cursor:grab;transition:all .15s;" style-hover="border-color:#CFD8E3;background:#F8FBFE;">
          <span style="width:10px;height:10px;border-radius:3px;background:{{ pal.color }};flex:none;"></span>
          <span style="font-size:12.5px;font-weight:600;color:#3D4753;">{{ pal.label }}</span>
        </div>
        </sc-for>
      </div>
    </div>

    <!-- MINIMAP (bottom-left) -->
    <div style="position:absolute;bottom:20px;left:20px;width:184px;height:118px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border:1px solid #E3E9F0;border-radius:12px;box-shadow:0 8px 24px rgba(20,60,110,.10);z-index:20;overflow:hidden;">
      <div style="position:relative;width:100%;height:100%;">
        <sc-for list="{{ miniRects }}" as="m" hint-placeholder-count="8">
        <div style="position:absolute;left:{{ m.left }}px;top:{{ m.top }}px;width:{{ m.w }}px;height:{{ m.h }}px;background:{{ m.color }};border-radius:2px;opacity:.85;"></div>
        </sc-for>
      </div>
    </div>

    <!-- ZOOM CONTROLS (bottom-right) -->
    <div style="position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;align-items:stretch;background:#fff;border:1px solid #E3E9F0;border-radius:12px;box-shadow:0 8px 24px rgba(20,60,110,.10);overflow:hidden;z-index:20;">
      <button aria-label="הגדל" style="width:42px;height:40px;border:0;background:#fff;color:#3D4753;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;" style-hover="background:#F4F8FC;"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
      <div style="height:1px;background:#EEF2F7;"></div>
      <div style="height:34px;display:flex;align-items:center;justify-content:center;font-family:'Assistant',sans-serif;font-size:12px;font-weight:700;color:#6B7785;">100%</div>
      <div style="height:1px;background:#EEF2F7;"></div>
      <button aria-label="הקטן" style="width:42px;height:40px;border:0;background:#fff;color:#3D4753;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;" style-hover="background:#F4F8FC;"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
      <div style="height:1px;background:#EEF2F7;"></div>
      <button aria-label="התאם לתצוגה" style="width:42px;height:40px;border:0;background:#fff;color:#3D4753;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;" style-hover="background:#F4F8FC;"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg></button>
    </div>
  </div>

  <!-- STATUS BAR -->
  <footer style="flex:none;height:34px;background:#181D24;display:flex;align-items:center;justify-content:space-between;padding:0 24px;">
    <span style="color:#AEB9C6;font-size:12px;">© iPracticom Academy — לשימוש פנימי בלבד</span>
    <span style="color:#6C7787;font-size:12px;font-family:'Assistant',sans-serif;">8 צמתים · 6 חיבורים</span>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}">
class Component extends DCLogic {
  renderVals() {
    const W = 232;
    const COL = { start:'#0075DB', question:'#2EB4FF', action:'#F59E0B', solution:'#22C55E', end:'#757D86', linked_flow:'#8B5CF6' };
    // node definitions: x,y top-left on the surface
    const N = {
      start:    { x:1180, y:210, type:'start',       title:'תקלת מצלמת אבטחה',            preview:'נקודת התחלה לאבחון',      height:92,  inputDy:46, state:'normal', outputs:[{dy:46}] },
      q1:       { x:870,  y:196, type:'question',     title:'האם נורית ה-LED דולקת?',      preview:'בדיקה ויזואלית של חיווי', height:154, inputDy:42, state:'normal', hasMedia:true, outputs:[{dy:99,label:'כן'},{dy:129,label:'לא'}] },
      q2:       { x:540,  y:150, type:'question',     title:'האם המצלמה מופיעה ב-NVR?',    preview:'איתור ברשת ההקלטה',       height:154, inputDy:42, state:'selected', outputs:[{dy:99,label:'כן'},{dy:129,label:'לא'}] },
      aPoE:     { x:540,  y:430, type:'action',       title:'בדוק חיבור חשמל ו-PoE',       preview:'ודא הזנת מתח לשלוחה',      height:92,  inputDy:46, state:'normal', outputs:[{dy:46}] },
      solution: { x:230,  y:96,  type:'solution',     title:'המצלמה תקינה — בדוק תצוגה',   preview:'המסלול הסתיים בהצלחה',     height:92,  inputDy:46, state:'normal', outputs:[] },
      aIP:      { x:230,  y:326, type:'action',       title:'בדוק כתובת IP והגדרות רשת',   preview:'התאמת כתובת ל-NVR',       height:92,  inputDy:46, state:'normal', outputs:[{dy:46}] },
      lnk:      { x:230,  y:470, type:'linked_flow',  title:'בעיות חשמל ו-PoE',            preview:'מעבר ל-Playbook ייעודי',  height:88,  inputDy:44, state:'normal', deepLink:'Playbook אחר', outputs:[] },
      end:      { x:840,  y:556, type:'end',          title:'הסלם לתמיכה טכנית',           preview:'פתיחת טיקט לתמיכה',       height:92,  inputDy:46, state:'disconnected', outputs:[] },
    };
    const order = ['start','q1','q2','aPoE','solution','aIP','lnk','end'];
    const nodes = order.map(id => Object.assign({ id }, N[id], {
      state: N[id].state || 'normal',
      hasMedia: !!N[id].hasMedia,
      deepLink: N[id].deepLink || '',
    }));

    const edgeDefs = [
      { s:'start', o:0, t:'q1' },
      { s:'q1', o:0, t:'q2' },
      { s:'q1', o:1, t:'aPoE' },
      { s:'q2', o:0, t:'solution' },
      { s:'q2', o:1, t:'aIP' },
      { s:'aPoE', o:0, t:'lnk' },
    ];
    const edges = edgeDefs.map(e => {
      const sn = N[e.s], tn = N[e.t];
      const x0 = sn.x, y0 = sn.y + sn.outputs[e.o].dy;        // output: left edge of source
      const x3 = tn.x + W, y3 = tn.y + tn.inputDy;            // input: right edge of target
      const cpo = Math.max(60, Math.abs(x3 - x0) * 0.5);
      return { d: `M ${x0} ${y0} C ${x0 - cpo} ${y0}, ${x3 + cpo} ${y3}, ${x3} ${y3}` };
    });

    const ms = 0.118;
    const miniRects = order.map(id => ({
      left: (N[id].x * ms).toFixed(1),
      top: (N[id].y * ms).toFixed(1),
      w: (W * ms).toFixed(1),
      h: (N[id].height * ms).toFixed(1),
      color: COL[N[id].type],
    }));

    const palette = [
      { label:'התחלה', color:COL.start },
      { label:'שאלה', color:COL.question },
      { label:'פעולה', color:COL.action },
      { label:'פתרון', color:COL.solution },
      { label:'סיום', color:COL.end },
      { label:'Playbook מקושר', color:COL.linked_flow },
    ];

    return { nodes, edges, miniRects, palette };
  }
}
</script>
</body>
</html>
