<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/fonts.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/colors.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/typography.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/spacing.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/effects.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/base.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/styles.css">
<script src="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/_ds_bundle.js"></script>
</helmet>
<header style="font-family:var(--font-sans);background:rgba(244,251,255,.86);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border-default);">
  <div style="padding:14px 32px;display:flex;align-items:center;gap:22px;">

    <!-- title (start = right) -->
    <sc-if value="{{ hasTitle }}" hint-placeholder-val="{{ true }}">
    <div style="flex:0 1 auto;min-width:0;overflow:hidden;">
      <h1 style="font-weight:600;font-size:24px;line-height:1.1;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary);">{{ title }}</h1>
      <sc-if value="{{ hasSubtitle }}" hint-placeholder-val="{{ true }}"><p style="font-size:13.5px;color:var(--text-secondary);margin:4px 0 0;white-space:nowrap;">{{ subtitle }}</p></sc-if>
    </div>
    </sc-if>

    <!-- global search -->
    <button style="flex:1;max-width:460px;margin:0 auto;display:flex;align-items:center;gap:11px;height:46px;padding:0 14px;border-radius:13px;border:1px solid var(--border-default);background:#fff;color:var(--text-secondary);font-family:inherit;font-size:14.5px;cursor:text;box-shadow:0 1px 2px rgba(24,29,36,.05);transition:all .2s cubic-bezier(.22,.61,.36,1);" style-hover="border-color:#9FD4F7;background:#F8FBFE;box-shadow:0 4px 14px rgba(20,60,110,.08);">
      <svg viewBox="0 0 24 24" width="19" height="19" style="flex:none;color:var(--accent);" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <span style="flex:1;min-width:0;text-align:start;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ searchPlaceholder }}</span>
      <span style="flex:none;display:inline-flex;align-items:center;gap:2px;font-family:var(--font-sans);font-weight:600;font-size:12px;color:var(--text-secondary);background:#F4F8FC;border:1px solid var(--border-default);border-radius:7px;padding:3px 8px;">⌘K</span>
    </button>

    <!-- actions (end = left) -->
    <div style="flex:none;display:flex;align-items:center;gap:14px;">

      <sc-if value="{{ hasActions }}"><div style="display:flex;align-items:center;gap:8px;">{{ children }}</div></sc-if>

      <div style="position:relative;">
        <button aria-label="התראות" onClick="{{ toggleOpen }}" style="position:relative;width:46px;height:46px;border-radius:13px;border:1px solid var(--border-default);background:#fff;display:flex;align-items:center;justify-content:center;color:#3D4753;cursor:pointer;box-shadow:0 1px 2px rgba(24,29,36,.05);transition:all .2s cubic-bezier(.22,.61,.36,1);" style-hover="border-color:#CFD8E3;background:#F8FBFE;">
          <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg>
          <sc-if value="{{ hasNotif }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;top:-6px;left:-6px;min-width:20px;height:20px;padding:0 5px;border-radius:999px;background:var(--caution);color:#fff;font-family:var(--font-sans);font-weight:600;font-size:11px;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface-app);">{{ notif }}</span></sc-if>
        </button>

        <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
          <div onClick="{{ closePanel }}" style="position:fixed;inset:0;z-index:30;"></div>

          <div style="position:absolute;top:calc(100% + 10px);left:0;width:400px;max-width:88vw;background:var(--surface-card);border-radius:16px;box-shadow:var(--shadow-menu, 0 16px 40px rgba(4,13,55,.14));border:1px solid var(--border-default);z-index:40;overflow:hidden;">

            <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border-default);">
              <h2 style="margin:0;font-weight:600;font-size:16px;color:var(--text-primary);">התראות</h2>
              <sc-if value="{{ hasNotif }}" hint-placeholder-val="{{ true }}">
                <button onClick="{{ markAllRead }}" style="border:none;background:transparent;color:var(--accent);font-family:var(--font-sans);font-weight:600;font-size:13px;cursor:pointer;padding:4px;" style-hover="text-decoration:underline;">סמן הכל כנקרא</button>
              </sc-if>
            </div>

            <div style="max-height:420px;overflow-y:auto;">
              <sc-for list="{{ notifications }}" as="n" hint-placeholder-count="3">
                <div onClick="{{ n.onOpen }}" style="display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border-default);cursor:pointer;background:{{ n.rowBg }};transition:background .15s;" style-hover="background:var(--surface-subtle);">
                  <span style="flex:none;width:40px;height:40px;border-radius:999px;background:{{ n.iconBg }};color:{{ n.iconColor }};display:flex;align-items:center;justify-content:center;">
                    <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="{{ n.icon }}" size="20" hint-size="20px,20px"></x-import>
                  </span>
                  <div style="flex:1;min-width:0;">
                    <div style="display:flex;align-items:center;gap:8px;">
                      <span style="font-weight:600;font-size:14.5px;color:var(--text-primary);">{{ n.title }}</span>
                      <sc-if value="{{ n.unread }}" hint-placeholder-val="{{ true }}"><span style="width:7px;height:7px;border-radius:999px;background:var(--accent);flex:none;"></span></sc-if>
                    </div>
                    <p style="margin:3px 0 0;font-size:13.5px;line-height:1.4;color:var(--text-secondary);">{{ n.desc }}</p>
                    <span style="display:block;margin-top:6px;font-size:12px;color:var(--text-muted);">{{ n.time }}</span>
                  </div>
                </div>
              </sc-for>

              <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
                <div style="padding:40px 18px;text-align:center;color:var(--text-secondary);font-size:14px;">אין התראות חדשות</div>
              </sc-if>
            </div>

            <a href="#" style="display:block;text-align:center;padding:13px;font-weight:600;font-size:13.5px;color:var(--accent);text-decoration:none;background:var(--surface-subtle);" style-hover="background:var(--neutral-silver);">לכל ההתראות</a>
          </div>
        </sc-if>
      </div>

      <a href="UserProfile.dc.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;padding:5px 12px 5px 6px;border-radius:999px;border:1px solid var(--border-default);background:#fff;box-shadow:0 1px 2px rgba(24,29,36,.05);transition:all .2s cubic-bezier(.22,.61,.36,1);" style-hover="border-color:#9FD4F7;background:#F8FBFE;">
        <span style="text-align:start;line-height:1.15;"><span style="display:block;font-weight:600;font-size:14px;color:var(--text-primary);white-space:nowrap;">{{ userName }}</span><span style="display:block;font-size:11.5px;color:var(--text-secondary);white-space:nowrap;">{{ userRole }}</span></span>
        <span style="width:38px;height:38px;border-radius:50%;background:var(--gradient-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;flex:none;box-shadow:0 4px 12px rgba(0,117,219,.28);">{{ userInitial }}</span>
      </a>
    </div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:76},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;דשבורד&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;subtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;מבט-על על ההכשרות והפעילות שלך&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;דניאל לוי&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userRole&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;תמיכה טכנית&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userInitial&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ד&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;notif&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;tsType&quot;:&quot;number&quot;},&quot;searchPlaceholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;חיפוש שיעורים, מאמרים, Playbooks…&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
const NOTIF_TYPES = {
  lesson:  { icon: 'Play2',    iconBg: 'var(--hue-sky)',                iconColor: 'var(--hue-cobalt)' },
  policy:  { icon: 'File',     iconBg: 'rgba(188,162,141,0.3)',         iconColor: 'var(--hue-bronze)' },
  exam:    { icon: 'Timeline', iconBg: 'rgba(241,194,27,0.3)',          iconColor: '#8A6E00' },
};

class Component extends DCLogic {
  state = { open: false, notifications: null };

  ensureNotifications() {
    if (this.state.notifications) return;
    this.state.notifications = [
      { id: 'n1', type: 'lesson', title: 'שיעור חדש זמין', desc: '"אבחון תקלות רשת בסיסי" נוסף למסלול הכשרת טכנאי שטח.', time: 'היום, 09:20', unread: true },
      { id: 'n2', type: 'exam',   title: 'מבחן חדש ממתין לך', desc: 'עליך לבצע את מבחן ההסמכה "יסודות בטיחות בשטח" עד סוף השבוע.', time: 'היום, 08:05', unread: true },
      { id: 'n3', type: 'policy', title: 'נוהל חדש נוסף למערכת', desc: '"נוהל טיפול בתקלות דחופות אצל לקוח" עודכן ופורסם.', time: 'אתמול, 16:40', unread: true },
    ];
  }

  renderVals() {
    this.ensureNotifications();
    const p = this.props || {};
    const list = this.state.notifications;
    const unreadCount = list.filter(n => n.unread).length;

    const notifications = list.map(n => {
      const meta = NOTIF_TYPES[n.type] || NOTIF_TYPES.lesson;
      return {
        ...n,
        icon: meta.icon,
        iconBg: meta.iconBg,
        iconColor: meta.iconColor,
        rowBg: n.unread ? 'var(--surface-subtle)' : 'transparent',
        onOpen: () => this.setState(s => ({
          notifications: s.notifications.map(x => x.id === n.id ? { ...x, unread: false } : x),
        })),
      };
    });

    return {
      children: p.children,
      hasActions: !!p.children,
      title: p.title || '',
      hasTitle: !!p.title,
      subtitle: p.subtitle || '',
      hasSubtitle: !!p.subtitle,
      userName: p.userName || 'דניאל לוי',
      userRole: p.userRole || 'תמיכה טכנית',
      userInitial: p.userInitial || 'ד',
      notif: unreadCount,
      hasNotif: unreadCount > 0,
      searchPlaceholder: p.searchPlaceholder || 'חיפוש שיעורים, מאמרים, Playbooks…',
      open: this.state.open,
      notifications,
      isEmpty: notifications.length === 0,
      toggleOpen: () => this.setState(s => ({ open: !s.open })),
      closePanel: () => this.setState({ open: false }),
      markAllRead: () => this.setState(s => ({ notifications: s.notifications.map(x => ({ ...x, unread: false })) })),
    };
  }
}

</script>
</body>
</html>
