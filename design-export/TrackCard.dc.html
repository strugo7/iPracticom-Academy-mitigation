<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/fonts.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/colors.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/typography.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/spacing.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/effects.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/base.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/styles.css">
<script src="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/_ds_bundle.js"></script>
</helmet>
<article style="width:100%;font-family:var(--font-sans);display:flex;flex-direction:column;background:var(--surface-card);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-card);transition:box-shadow var(--transition-base),transform var(--transition-base);" style-hover="box-shadow:var(--shadow-menu);transform:translateY(-4px);">

  <!-- THUMBNAIL -->
  <div style="position:relative;height:172px;background:linear-gradient(135deg,var(--hue-sky) 0%,#EAF4FF 55%,var(--surface-app) 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;">
    <img src="{{ thumb }}" alt="" style="position:relative;height:128px;object-fit:contain;z-index:1;"/>

    <!-- category chip (top-right in RTL) -->
    <div style="position:absolute;top:14px;right:14px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);color:var(--accent);font-weight:var(--font-weight-demibold);font-size:12.5px;padding:6px 12px;border-radius:var(--radius-full);box-shadow:0 2px 6px rgba(4,13,55,.08);z-index:2;">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="Pushpin2Fill" size="13" hint-size="13px,13px"></x-import>
      {{ category }}
    </div>

    <!-- status pill (top-left in RTL) -->
    <span style="position:absolute;top:14px;left:14px;z-index:2;">
    <sc-if value="{{ inProgress }}" hint-placeholder-val="{{ true }}">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Badge" color="sky" hint-size="auto,24px">בתהליך</x-import>
    </sc-if>
    <sc-if value="{{ notStarted }}">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Badge" color="neutral" hint-size="auto,24px">טרם התחיל</x-import>
    </sc-if>
    <sc-if value="{{ completed }}">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Badge" color="green" hint-size="auto,24px">
        <span style="display:inline-flex;align-items:center;gap:5px;">
          <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="Check" size="13" hint-size="13px,13px"></x-import>
          הושלם
        </span>
      </x-import>
    </sc-if>
    </span>
  </div>

  <!-- BODY -->
  <div style="flex:1;display:flex;flex-direction:column;gap:16px;padding:24px;">
    <div>
      <h3 style="font-weight:var(--font-weight-demibold);font-size:18.5px;margin:0 0 8px;line-height:1.3;color:var(--text-primary);">{{ title }}</h3>
      <p style="font-size:var(--text-tiny-size);line-height:1.5;color:var(--text-secondary);margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">{{ description }}</p>
    </div>

    <!-- meta -->
    <div style="display:flex;align-items:center;gap:16px;">
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:var(--text-tiny-size);color:var(--text-secondary);">
        <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="Timeline" size="16" hint-size="16px,16px"></x-import>
        {{ difficulty }}
      </span>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:var(--text-tiny-size);color:var(--text-secondary);">
        <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="Clock" size="16" hint-size="16px,16px"></x-import>
        {{ hours }}
      </span>
    </div>

    <!-- progress -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:var(--text-tiny-size);font-weight:var(--font-weight-demibold);color:var(--text-secondary);">{{ lessonsText }}</span>
        <sc-if value="{{ completed }}">
        <span style="font-weight:var(--font-weight-demibold);font-size:14px;color:var(--success);">{{ percentText }}</span>
        </sc-if>
        <sc-if value="{{ notCompleted }}" hint-placeholder-val="{{ true }}">
        <span style="font-weight:var(--font-weight-demibold);font-size:14px;color:var(--accent);">{{ percentText }}</span>
        </sc-if>
      </div>
      <div style="height:8px;border-radius:var(--radius-full);background:var(--hue-sky);overflow:hidden;">
        <sc-if value="{{ completed }}">
        <div style="height:100%;border-radius:var(--radius-full);background:var(--success);width:{{ barWidth }};"></div>
        </sc-if>
        <sc-if value="{{ notCompleted }}" hint-placeholder-val="{{ true }}">
        <div style="height:100%;border-radius:var(--radius-full);background:var(--gradient-accent);width:{{ barWidth }};transition:width .5s cubic-bezier(.22,.61,.36,1);"></div>
        </sc-if>
      </div>
    </div>

    <!-- CTA -->
    <div style="margin-top:auto;padding-top:4px;">
      <sc-if value="{{ inProgress }}" hint-placeholder-val="{{ true }}">
        <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="primary" hint-size="100%,40px" style="width:100%;">
          <a href="{{ ctaHref }}" style="text-decoration:none;color:inherit;display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:center;">
            המשך ללמוד
            <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="ArrowWest" size="18" hint-size="18px,18px"></x-import>
          </a>
        </x-import>
      </sc-if>
      <sc-if value="{{ notStarted }}">
        <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Button" variant="primary" hint-size="100%,40px" style="width:100%;">
          <a href="{{ ctaHref }}" style="text-decoration:none;color:inherit;display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:center;">
            <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="Play" size="16" hint-size="16px,16px"></x-import>
            התחל ללמוד
          </a>
        </x-import>
      </sc-if>
      <sc-if value="{{ completed }}">
      <button style="width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--hue-mint);color:var(--success);font-family:inherit;font-weight:var(--font-weight-demibold);font-size:var(--text-small-size);border:0;border-radius:var(--radius-pill);padding:8px 24px;cursor:pointer;transition:background var(--transition-fast);" style-hover="background:#A0F5C8;">
        <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="SuccessV" size="17" hint-size="17px,17px"></x-import>
        צפה בתעודה
      </button>
      </sc-if>
    </div>
  </div>
</article>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:446},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;in_progress&quot;,&quot;not_started&quot;,&quot;completed&quot;],&quot;default&quot;:&quot;in_progress&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;category&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;טכנאי שטח&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;הכשרת טכנאי שטח&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;description&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;יסודות התקנה, חיווט ותחזוקת מערכות בשטח — מהבטיחות ועד מסירה ללקוח.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;difficulty&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;בינוני&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hours&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;8 שעות&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;lessonsDone&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:7,&quot;tsType&quot;:&quot;number&quot;},&quot;lessonsTotal&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:12,&quot;tsType&quot;:&quot;number&quot;},&quot;percent&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:58,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;thumb&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;assets/illus-support.png&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const status = p.status || 'in_progress';
    const d = ({
      in_progress: { done: 7, total: 12, pct: 58 },
      not_started: { done: 0, total: 12, pct: 0 },
      completed:   { done: 12, total: 12, pct: 100 },
    })[status] || { done: 0, total: 12, pct: 0 };
    const done = p.lessonsDone ?? d.done;
    const total = p.lessonsTotal ?? d.total;
    const pct = p.percent ?? d.pct;
    return {
      category: p.category ?? 'טכנאי שטח',
      title: p.title ?? 'הכשרת טכנאי שטח',
      description: p.description ?? 'יסודות התקנה, חיווט ותחזוקת מערכות בשטח — מהבטיחות ועד מסירה ללקוח.',
      difficulty: p.difficulty ?? 'בינוני',
      hours: p.hours ?? '8 שעות',
      thumb: p.thumb ?? 'assets/illus-support.png',
      ctaHref: p.href || '#',
      lessonsText: done + ' מתוך ' + total + ' שיעורים',
      percentText: pct + '%',
      barWidth: pct + '%',
      inProgress: status === 'in_progress',
      notStarted: status === 'not_started',
      completed: status === 'completed',
      notCompleted: status !== 'completed',
    };
  }
}

</script>
</body>
</html>
