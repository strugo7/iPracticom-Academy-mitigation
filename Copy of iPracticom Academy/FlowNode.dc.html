<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ onSelect }}" style="position:relative;width:232px;min-height:{{ height }}px;background:#fff;border-radius:14px;border:{{ borderCss }};box-shadow:{{ shadowCss }};cursor:pointer;">

  <div style="height:5px;border-radius:13px 13px 0 0;background:{{ typeColor }};"></div>

  <sc-if value="{{ disconnected }}">
  <div style="position:absolute;top:-11px;left:12px;display:inline-flex;align-items:center;gap:5px;background:#FCF3DA;color:#8A6E00;border:1px solid #EBD7A6;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;z-index:4;">
    <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    מנותק
  </div>
  </sc-if>

  <div style="padding:12px 14px 14px;">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px;">
      <div style="width:30px;height:30px;border-radius:9px;background:{{ typeTint }};color:{{ typeColor }};display:flex;align-items:center;justify-content:center;flex:none;">
        <sc-if value="{{ isStart }}"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg></sc-if>
        <sc-if value="{{ isQuestion }}"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></sc-if>
        <sc-if value="{{ isAction }}"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg></sc-if>
        <sc-if value="{{ isSolution }}"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><path d="m9 11 3 3L22 4"></path></svg></sc-if>
        <sc-if value="{{ isEnd }}"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></sc-if>
        <sc-if value="{{ isLinked }}"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg></sc-if>
      </div>
      <span style="font-size:11.5px;font-weight:700;color:{{ typeColor }};letter-spacing:.01em;">{{ typeLabel }}</span>
      <sc-if value="{{ hasMedia }}">
      <span style="margin-inline-start:auto;display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:#757D86;background:#F4F8FC;border:1px solid #EAF0F6;padding:2px 7px;border-radius:7px;">
        <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"></path></svg>
        מדיה
      </span>
      </sc-if>
    </div>
    <div style="font-weight:700;font-size:14.5px;color:#181D24;line-height:1.35;">{{ title }}</div>
    <div style="font-size:12px;color:#757D86;margin-top:4px;line-height:1.4;">{{ preview }}</div>

    <sc-if value="{{ hasDeepLink }}">
    <div style="display:inline-flex;align-items:center;gap:6px;margin-top:11px;background:#E3ECF5;color:#004E9B;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:8px;">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
      {{ deepLinkLabel }}
    </div>
    </sc-if>
  </div>

  <!-- input handle (right edge) -->
  <sc-if value="{{ hasInput }}" hint-placeholder-val="{{ true }}">
  <div style="position:absolute;right:-7px;top:{{ inputDy }}px;width:13px;height:13px;border-radius:50%;background:#fff;border:2.5px solid #9AA5B1;z-index:3;"></div>
  </sc-if>

  <!-- output handles (left edge) + option labels -->
  <sc-for list="{{ outputs }}" as="out" hint-placeholder-count="0">
  <div style="position:absolute;left:-7px;top:{{ out.dy }}px;width:13px;height:13px;border-radius:50%;background:#fff;border:2.5px solid {{ typeColor }};z-index:3;"></div>
  <sc-if value="{{ out.hasLabel }}">
  <div style="position:absolute;left:12px;top:{{ out.labelTop }}px;background:#F4F8FC;border:1px solid #E1E6EC;color:#3D4753;font-size:11.5px;font-weight:700;padding:2px 11px;border-radius:999px;z-index:3;">{{ out.label }}</div>
  </sc-if>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:232,&quot;height&quot;:160},&quot;type&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;start&quot;,&quot;question&quot;,&quot;action&quot;,&quot;solution&quot;,&quot;end&quot;,&quot;linked_flow&quot;],&quot;default&quot;:&quot;question&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;האם נורית ה-LED דולקת?&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;preview&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;בדיקה ויזואלית של חיווי&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;state&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;normal&quot;,&quot;selected&quot;,&quot;disconnected&quot;],&quot;default&quot;:&quot;normal&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hasMedia&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;deepLink&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;height&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:154,&quot;tsType&quot;:&quot;number&quot;},&quot;inputDy&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:42,&quot;tsType&quot;:&quot;number&quot;},&quot;outputs&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Output[]&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const type = p.type || 'action';
    const COL = { start:'#0075DB', question:'#2EB4FF', action:'#8E7057', solution:'#00857C', end:'#757D86', linked_flow:'#004E9B' };
    const TINT = { start:'#E9F3FC', question:'#E2F5FD', action:'#F1EAE2', solution:'#E3F3F1', end:'#EEF1F5', linked_flow:'#E3ECF5' };
    const LBL = { start:'התחלה', question:'שאלה', action:'פעולה', solution:'פתרון', end:'סיום', linked_flow:'Playbook מקושר' };
    const state = p.state || 'normal';
    const outputs = (Array.isArray(p.outputs) ? p.outputs : []).map(o => ({
      dy: o.dy, label: o.label || '', hasLabel: !!o.label, labelTop: o.dy - 11,
    }));
    return {
      typeColor: COL[type] || COL.action,
      typeTint: TINT[type] || TINT.action,
      typeLabel: LBL[type] || 'פעולה',
      isStart: type==='start', isQuestion: type==='question', isAction: type==='action',
      isSolution: type==='solution', isEnd: type==='end', isLinked: type==='linked_flow',
      title: p.title || '', preview: p.preview || '',
      height: p.height || 92,
      hasInput: type !== 'start',
      inputDy: p.inputDy || 46,
      hasMedia: !!p.hasMedia,
      hasDeepLink: type==='linked_flow' || !!p.deepLink,
      deepLinkLabel: p.deepLink || 'Playbook אחר',
      outputs,
      selected: state==='selected',
      disconnected: state==='disconnected',
      borderCss: state==='selected' ? '2px solid #0075DB' : (state==='disconnected' ? '1.5px dashed #8A6E00' : '1px solid #E1E6EC'),
      shadowCss: state==='selected' ? '0 0 0 4px rgba(0,117,219,.15), 0 10px 24px rgba(20,60,110,.16)' : '0 4px 14px rgba(20,60,110,.10)',
    };
  }
}
</script>
</body>
</html>
