<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/fonts.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/colors.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/typography.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/spacing.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/effects.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/tokens/base.css">
<link rel="stylesheet" href="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/styles.css">
<script src="_ds/ipracticom-design-system-shira-c23dff89-c66d-4d91-9f65-f9241623cc71/_ds_bundle.js"></script>
</helmet>
<div style="position:relative;display:flex;flex-direction:column;gap:16px;background:var(--surface-card);border-radius:var(--radius-xl);padding:24px;box-shadow:var(--shadow-card);font-family:var(--font-sans);transition:box-shadow .25s cubic-bezier(.22,.61,.36,1),transform .25s cubic-bezier(.22,.61,.36,1);" style-hover="box-shadow:var(--shadow-menu);transform:translateY(-4px);">

  <a href="{{ href }}" aria-label="פתח Playbook" style="position:absolute;inset:0;z-index:1;border-radius:var(--radius-xl);"></a>

  <!-- top row: category tag + edit -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
    <span style="display:inline-flex;align-items:center;border-radius:var(--radius-full);font-family:var(--font-sans);font-weight:var(--font-weight-regular);height:24px;padding:0 9px;font-size:15px;background:{{ catBg }};color:{{ catFg }};">{{ catLabel }}</span>
    <sc-if value="{{ canEdit }}">
    <span style="position:relative;z-index:2;">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.IconButton" variant="outline" size="sm" hint-size="32px,32px">
        <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="Edit" size="16" hint-size="16px,16px"></x-import>
      </x-import>
    </span>
    </sc-if>
  </div>

  <!-- title + desc -->
  <div>
    <h3 style="font-weight:var(--font-weight-demibold);font-size:18px;margin:0 0 8px;line-height:1.35;color:var(--text-primary);">{{ title }}</h3>
    <p style="font-size:var(--text-small-size);line-height:1.5;color:var(--text-secondary);margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">{{ description }}</p>
  </div>

  <!-- meta -->
  <div style="display:flex;flex-wrap:wrap;gap:16px;padding:16px 0 0;border-top:1px solid var(--border-default);">
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:var(--text-tiny-size);color:var(--text-secondary);">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="Timeline" size="16" hint-size="16px,16px"></x-import>
      {{ difficulty }}
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:var(--text-tiny-size);color:var(--text-secondary);">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="Clock" size="16" hint-size="16px,16px"></x-import>
      {{ avgTime }}
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:var(--text-tiny-size);font-weight:var(--font-weight-demibold);color:var(--success);">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="SuccessV" size="16" hint-size="16px,16px"></x-import>
      {{ successRate }}% הצלחה
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:var(--text-tiny-size);color:var(--text-secondary);">
      <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Icon" name="DataFlow" size="16" hint-size="16px,16px"></x-import>
      {{ uses }} שימושים
    </span>
  </div>

  <!-- tags -->
  <sc-if value="{{ hasTags }}" hint-placeholder-val="{{ true }}">
  <div style="display:flex;flex-wrap:wrap;gap:8px;">
    <sc-for list="{{ tags }}" as="tag" hint-placeholder-count="2">
    <x-import component-from-global-scope="IPracticomDesignSystem_c23dff.Tag" type="break" hint-size="auto,24px">{{ tag }}</x-import>
    </sc-for>
  </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:280},&quot;category&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;pbx&quot;,&quot;mikrotik&quot;,&quot;cameras&quot;,&quot;sound&quot;,&quot;fire&quot;,&quot;temp&quot;,&quot;network&quot;,&quot;general&quot;],&quot;default&quot;:&quot;pbx&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;אין צליל חיוג במרכזיית PBX&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;description&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;אבחון שלב-אחר-שלב של תקלת צליל חיוג: בדיקת רישום SIP, חיווט ומצב השלוחה.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;difficulty&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;קל&quot;,&quot;בינוני&quot;,&quot;מתקדם&quot;],&quot;default&quot;:&quot;בינוני&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;avgTime&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;4 דק׳&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;successRate&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:92,&quot;tsType&quot;:&quot;number&quot;},&quot;uses&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:47,&quot;tsType&quot;:&quot;number&quot;},&quot;tags&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string[]&quot;},&quot;canEdit&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const CATS = {
      pbx:      { label: 'מרכזיות ענן (PBX)', bg: '#C9EDFF', fg: '#0075DB' },
      mikrotik: { label: 'Firewall MikroTik',  bg: 'rgba(46,180,255,.18)', fg: '#004E9B' },
      cameras:  { label: 'מצלמות אבטחה',        bg: 'rgba(0,133,124,.15)', fg: '#00857C' },
      sound:    { label: 'מערכות סאונד',        bg: 'rgba(188,162,141,.3)', fg: '#8E7057' },
      fire:     { label: 'גילוי אש',            bg: '#FFDCD8', fg: '#C94236' },
      temp:     { label: 'בקרי טמפרטורה',       bg: '#FFEBA4', fg: '#8B700E' },
      network:  { label: 'רשתות',               bg: '#DDFFEA', fg: '#00857C' },
      general:  { label: 'כללי',                bg: '#E1E6EC', fg: '#757D86' },
    };
    const cat = CATS[p.category] || CATS.general;
    const tags = Array.isArray(p.tags) ? p.tags : [];
    return {
      catLabel: cat.label,
      catBg: cat.bg,
      catFg: cat.fg,
      title: p.title ?? '',
      description: p.description ?? '',
      difficulty: p.difficulty ?? 'בינוני',
      avgTime: p.avgTime ?? '',
      successRate: p.successRate ?? 0,
      uses: p.uses ?? 0,
      tags,
      hasTags: tags.length > 0,
      href: p.href || '#',
      editHref: p.editHref || '#',
      canEdit: !!p.canEdit,
    };
  }
}

</script>
</body>
</html>
