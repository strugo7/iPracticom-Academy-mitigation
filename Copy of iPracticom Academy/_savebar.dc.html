<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;justify-content:flex-end;gap:14px;padding:4px 0 8px;">
  <sc-if value="{{ saved }}">
  <span style="display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;color:#1F9E6B;animation:stFade .24s ease;">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    השינויים נשמרו
  </span>
  </sc-if>
  <button style="height:46px;padding:0 20px;border-radius:12px;border:1px solid #E3E9F0;background:#fff;color:#6B7785;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit;transition:all .16s;" style-hover="background:#F8FBFE;border-color:#CFD8E3;">ביטול</button>
  <button onClick="{{ onSave }}" style="display:inline-flex;align-items:center;gap:8px;height:46px;padding:0 24px;border-radius:12px;border:0;background:#0075DB;color:#fff;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit;box-shadow:0 8px 22px rgba(0,117,219,.26);transition:all .16s;" style-hover="background:#0059A8;" style-active="transform:scale(.98);">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
    שמירת שינויים
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:72},&quot;saved&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onSave&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}"></script>
</body>
</html>
